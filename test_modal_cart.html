<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Test Modal Cart</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#testModal">
            Mở Modal Test
        </button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="testModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Test Thêm Thuốc</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Tên thuốc</th>
                                <th>Giá</th>
                                <th>Số lượng</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Paracetamol</td>
                                <td>5,000đ</td>
                                <td>
                                    <input type="number" class="form-control medicine-quantity" 
                                           value="0" min="0" max="100" 
                                           data-id="1" style="width: 80px;">
                                </td>
                                <td>
                                    <button type="button" class="btn btn-success add-to-modal-cart"
                                            data-id="1"
                                            data-name="Paracetamol"
                                            data-price="5000"
                                            data-unit="Viên"
                                            data-inventory="100">
                                        <i class="bi bi-plus-circle"></i> Thêm
                                    </button>
                                </td>
                            </tr>
                            <tr>
                                <td>Vitamin C</td>
                                <td>10,000đ</td>
                                <td>
                                    <input type="number" class="form-control medicine-quantity" 
                                           value="0" min="0" max="50" 
                                           data-id="2" style="width: 80px;">
                                </td>
                                <td>
                                    <button type="button" class="btn btn-success add-to-modal-cart"
                                            data-id="2"
                                            data-name="Vitamin C"
                                            data-price="10000"
                                            data-unit="Viên"
                                            data-inventory="50">
                                        <i class="bi bi-plus-circle"></i> Thêm
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <hr>
                    
                    <h5>Giỏ hàng</h5>
                    <div id="cartDisplay" style="min-height: 100px; border: 1px solid #ddd; padding: 10px;">
                        <p class="text-muted">Chưa có sản phẩm</p>
                    </div>
                    
                    <div class="mt-3">
                        <strong>Tổng tiền: <span id="totalAmount">0đ</span></strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let cartItems = [];
        
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        function updateCart() {
            const cartDiv = document.getElementById('cartDisplay');
            const totalSpan = document.getElementById('totalAmount');
            
            if (cartItems.length === 0) {
                cartDiv.innerHTML = '<p class="text-muted">Chưa có sản phẩm</p>';
                totalSpan.textContent = '0đ';
                return;
            }
            
            let html = '';
            let total = 0;
            
            cartItems.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `<div class="mb-2">
                    <strong>${item.name}</strong> - ${item.quantity} ${item.unit} × ${formatNumber(item.price)}đ = ${formatNumber(subtotal)}đ
                </div>`;
            });
            
            cartDiv.innerHTML = html;
            totalSpan.textContent = formatNumber(total) + 'đ';
        }
        
        // Event delegation
        document.addEventListener('click', function(e) {
            if (e.target.closest('.add-to-modal-cart')) {
                console.log('Button clicked!');
                
                const btn = e.target.closest('.add-to-modal-cart');
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                const unit = btn.getAttribute('data-unit');
                const inventory = parseInt(btn.getAttribute('data-inventory'));
                
                console.log('Data:', {id, name, price, unit, inventory});
                
                const quantityInput = document.querySelector('input.medicine-quantity[data-id="' + id + '"]');
                let quantity = parseInt(quantityInput.value);
                
                console.log('Quantity:', quantity);
                
                if (isNaN(quantity) || quantity < 1) {
                    alert('Vui lòng nhập số lượng lớn hơn 0');
                    return;
                }
                
                if (quantity > inventory) {
                    alert('Số lượng vượt quá tồn kho');
                    return;
                }
                
                // Check if already in cart
                const existingIndex = cartItems.findIndex(item => item.id === id);
                
                if (existingIndex >= 0) {
                    cartItems[existingIndex].quantity += quantity;
                } else {
                    cartItems.push({id, name, price, unit, quantity, inventory});
                }
                
                console.log('Cart items:', cartItems);
                updateCart();
                quantityInput.value = 0;
            }
        });
        
        console.log('Test page loaded');
    </script>
</body>
</html>
