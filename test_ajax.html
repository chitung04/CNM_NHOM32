<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test AJAX Add to Cart</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h2>Test AJAX Add to Cart</h2>
    <p>Medicine ID: <input type="number" id="medicineId" value="1"></p>
    <p>Quantity: <input type="number" id="quantity" value="1"></p>
    <button id="testBtn">Test Add to Cart</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    
    <script>
    $(document).ready(function() {
        console.log('jQuery version:', $.fn.jquery);
        
        $('#testBtn').click(function() {
            const medicineId = $('#medicineId').val();
            const quantity = $('#quantity').val();
            
            console.log('Testing with Medicine ID:', medicineId, 'Quantity:', quantity);
            $('#result').html('Loading...');
            
            $.ajax({
                url: 'ajax/add_to_cart.php',
                method: 'POST',
                data: {
                    medicine_id: medicineId,
                    quantity: quantity
                },
                dataType: 'json',
                success: function(response) {
                    console.log('Success:', response);
                    $('#result').html('<pre style="color: green;">' + JSON.stringify(response, null, 2) + '</pre>');
                },
                error: function(xhr, status, error) {
                    console.error('Error:', status, error);
                    console.error('Response:', xhr.responseText);
                    $('#result').html('<pre style="color: red;">Error: ' + xhr.status + '\n' + xhr.responseText + '</pre>');
                }
            });
        });
    });
    </script>
</body>
</html>
